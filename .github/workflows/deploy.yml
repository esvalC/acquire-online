name: Deploy to AWS

on:
  push:
    branches: [main]

# Required for OIDC token request
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::654654349405:role/acquire-online-github-actions-role
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0bbc6c13fd3dfe6ab \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy from GitHub Actions - ${{ github.sha }}" \
            --parameters 'commands=[
              "sudo -u ubuntu GIT_SSH_COMMAND=\"ssh -i /home/ubuntu/.ssh/deploy_key\" git -C /home/ubuntu/acquire-online pull origin main",
              "sudo -u ubuntu npm --prefix /home/ubuntu/acquire-online install --omit=dev",
              "sudo -u ubuntu pm2 restart acquire-online",
              "git -C /home/ubuntu/acquire-main -c safe.directory=/home/ubuntu/acquire-main pull origin main",
              "npm --prefix /home/ubuntu/acquire-main install --omit=dev",
              "pm2 restart acquire-main",
              "echo DEPLOY_DONE"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for the command to finish (up to 2 min)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id i-0bbc6c13fd3dfe6ab

          # Print the output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-0bbc6c13fd3dfe6ab \
            --query "StandardOutputContent" \
            --output text

          # Fail the workflow if the command failed
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-0bbc6c13fd3dfe6ab \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi
